<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HAYSA Field Availability</title>

  <!-- FullCalendar CSS -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet" />

  <!-- App CSS -->
  <link rel="stylesheet" href="style_v2.css" />
</head>
<body>
  <!-- Loading overlay -->
  <div id="loadingOverlay" style="
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9998;
    ">
    <div>Loading season data…</div>
  </div>

  <div class="app-container">
    <header class="app-header">
      <div class="header-top">
        <h1>HAYSA Field Availability</h1>
        <button id="refreshButton" style="display:none;">Refresh</button>
      </div>

      <div class="controls-row">
        <label>
          <input type="checkbox" id="practiceOnlyToggle" />
          Show practice-eligible availability only
        </label>
      </div>

      <div class="controls-row">
        <div id="fieldLayersContainer"></div>
      </div>

      <div class="controls-row">
        <div class="legend">
          <span class="legend-label">Legend:</span>
          <span class="legend-item legend-availability-practice">Practice Available</span>
          <span class="legend-item legend-availability-game-only">Game-Only Availability</span>
          <span class="legend-item legend-practice">Scheduled Practice</span>
          <span class="legend-item legend-game">Scheduled Game</span>
          <span class="legend-item legend-block">Admin Block</span>
          <span class="legend-item legend-closure">Closure</span>
        </div>
      </div>
    </header>

    <main>
      <div id="calendar"></div>

      <div class="controls-row" style="margin-top: 10px;">
        <button id="mobilePrevWeek">Prev</button>
        <button id="mobileToday">Today</button>
        <button id="mobileNextWeek">Next</button>
      </div>
    </main>
  </div>

  <!-- Practice action panel -->
  <div id="practiceActionPanel">
    <div>
      <h2>Practice Actions</h2>
      <p>Use this area for future practice request tools or guidance.</p>
    </div>
    <button id="closePracticePanel" class="practice-close-btn">Close</button>
  </div>

  <!-- Floating buttons -->
  <button id="practiceActionFab" style="
      position: fixed;
      right: 20px;
      bottom: 80px;
      z-index: 9999;
    ">
    Practice Options
  </button>

  <button id="practiceActionFabMobile" style="
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 9999;
    ">
    Practice
  </button>

  <!-- FullCalendar JS -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

  <!-- App JS -->
<script src="main_v6.js?v=1"></script>
</body>
</html>

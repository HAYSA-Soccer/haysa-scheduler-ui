<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HAYSA Field Availability</title>

  <!-- FullCalendar CSS -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet" />

  <!-- Our styles -->
  <link rel="stylesheet" href="style_v2.css" />
</head>
<body>
  <div class="app-container">
    <header class="app-header">

      <!-- Row 1: Title + Last Update -->
      <div class="header-top">
        <h1>HAYSA Field Calendar</h1>
        <span id="lastUpdate" class="last-update"></span>
      </div>

      <!-- Row 2: Practice Only -->
      <div class="controls-row">
        <label class="toggle-label">
          <input type="checkbox" id="practiceOnlyToggle" />
          <span>Practice Only</span>
        </label>
      </div>

      <!-- Row 3: Field Layers -->
      <div class="controls-row">
        <div class="field-layers">
          <div class="field-layers-label">Field Layers:</div>
          <div id="fieldLayersContainer" class="field-layers-container">
            <!-- JS injects checkboxes here -->
          </div>
        </div>
      </div>

      <!-- Row 4: Legend -->
      <div class="controls-row">
        <div class="legend">
          <span class="legend-label">Legend:</span>
          <span class="legend-item legend-practice">Practice Available</span>
          <span class="legend-item legend-gameonly">Game-Only Availability</span>
          <span class="legend-item legend-game">Game</span>
          <span class="legend-item legend-block">Block / Closure</span>
        </div>
      </div>

    </header>

    <main>
      <div id="calendar"></div>
    </main>
  </div>

  <!-- FullCalendar JS -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <!-- Our logic -->
  <script src="main_v2.js"></script>
</body>
</html>

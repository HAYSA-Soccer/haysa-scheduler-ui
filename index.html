<div class="controls-row">
  <div class="legend">
    <span class="legend-label">Legend:</span>

    <!-- Practice availability (bright green) -->
    <span class="legend-item legend-availability-practice">
      Practice Available
    </span>

    <!-- Game-only availability (muted green) -->
    <span class="legend-item legend-availability-game-only">
      Game-Only Availability
    </span>

    <!-- Actual scheduled practices (gray) -->
    <span class="legend-item legend-practice">
      Practice
    </span>

    <!-- Actual scheduled games (blue) -->
    <span class="legend-item legend-game">
      Game
    </span>

    <!-- Blocks (amber) -->
    <span class="legend-item legend-block">
      Block / Unavailable
    </span>

    <!-- Closures (red) -->
    <span class="legend-item legend-closure">
      Field Closed
    </span>
  </div>
</div>
